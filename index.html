<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wyzwanie dla Mamy!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-image: url('rm321-baifernn-01-e.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            margin: 0;
            padding: 20px;
        }

        #game-container {
            margin: 20px auto;
            display: inline-block;
            padding: 25px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 2px solid #fce4ec;
            max-width: 90%;
        }

        /* Naprawiony kwadratowy kształt siatki */
        .grid {
            display: grid;
            gap: 2px;
            background-color: #bbb;
            border: 3px solid #999;
            margin: 15px auto;
            width: fit-content; /* Ważne dla wycentrowania */
        }

        .cell {
            width: 40px; /* Stała szerokość */
            height: 40px; /* Stała wysokość */
            background-color: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid #ddd;
            font-size: 18px;
            user-select: none;
            box-sizing: border-box;
        }

        .cell.revealed { background-color: #fff; cursor: default; }
        .cell.mine { background-color: #ffcdd2; }
        .cell.flag { background-color: #fff9c4; }

        /* Przyciski na dole */
        #controls { margin-top: 20px; display: flex; justify-content: center; gap: 10px; }
        .mode-btn {
            padding: 12px 24px;
            font-size: 16px;
            border: 2px solid #ad1457;
            border-radius: 30px;
            cursor: pointer;
            background: white;
            color: #ad1457;
            font-weight: bold;
        }
        .mode-btn.active { background: #ad1457; color: white; }

        /* Ładne powiadomienie */
        #custom-alert {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.3);
            z-index: 1000;
            border: 2px solid #ad1457;
        }
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 999;
        }

        #surprise {
            display: none;
            max-width: 550px;
            margin: 20px auto;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 20px;
            border: 3px solid #ad1457;
        }
        #surprise img { width: 100%; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="main-ui">
        <h1 style="color: #ad1457;">Wyzwanie dla Mamy 🌸</h1>
        <p>Rozwiąż zagadkę, aby zobaczyć niespodziankę!</p>

        <div id="game-container">
            <div id="grid" class="grid"></div>
            <p>Miny: <span id="mine-count">0</span> | Flagi: <span id="flag-count">0</span></p>
            
            <div id="controls">
                <button id="btn-dig" class="mode-btn active" onclick="setMode('dig')">⛏️ Odkrywaj</button>
                <button id="btn-flag" class="mode-btn" onclick="setMode('flag')">🚩 Flaga</button>
            </div>
        </div>
    </div>

    <div id="surprise">
        <h2>🎉 WSZYSTKIEGO NAJLEPSZEGO MAMO! 🎉</h2>
        <img src="mama_i_ja.jpg" alt="Zdjęcie z Mamą">
        <p style="font-size: 1.2em; color: #ad1457; font-weight: bold;">Jesteś mistrzynią! Kocham Cię! ❤️</p>
    </div>

    <div id="overlay"></div>
    <div id="custom-alert">
        <h3 id="alert-title"></h3>
        <p id="alert-msg"></p>
        <button onclick="closeAlert()" style="padding: 8px 20px; cursor:pointer;">OK</button>
    </div>

    <script>
        let config = {
            1: { rows: 5, cols: 5, mines: 3 },
            2: { rows: 10, cols: 10, mines: 15 }
        };
        let currentLevel = 1;
        let grid = [];
        let gameOver = false;
        let mode = 'dig';
        let flags = 0;

        function setMode(m) {
            mode = m;
            document.getElementById('btn-dig').classList.toggle('active', m === 'dig');
            document.getElementById('btn-flag').classList.toggle('active', m === 'flag');
        }

        function showAlert(title, msg) {
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-msg').innerText = msg;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('custom-alert').style.display = 'block';
        }

        function closeAlert() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('custom-alert').style.display = 'none';
            if (gameOver) initGame();
        }

        function initGame() {
            const settings = config[currentLevel];
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            gridEl.style.gridTemplateColumns = `repeat(${settings.cols}, 40px)`;
            grid = [];
            flags = 0;
            gameOver = false;
            document.getElementById('flag-count').innerText = 0;
            document.getElementById('mine-count').innerText = settings.mines;

            for (let r = 0; r < settings.rows; r++) {
                grid[r] = [];
                for (let c = 0; c < settings.cols; c++) {
                    const el = document.createElement('div');
                    el.className = 'cell';
                    el.onclick = () => handleAction(r, c);
                    el.oncontextmenu = (e) => { e.preventDefault(); handleAction(r, c, true); };
                    gridEl.appendChild(el);
                    grid[r][c] = { mine: false, revealed: false, flagged: false, count: 0, el: el };
                }
            }

            let placed = 0;
            while (placed < settings.mines) {
                let r = Math.floor(Math.random() * settings.rows);
                let c = Math.floor(Math.random() * settings.cols);
                if (!grid[r][c].mine) { grid[r][c].mine = true; placed++; }
            }

            for (let r = 0; r < settings.rows; r++) {
                for (let c = 0; c < settings.cols; c++) {
                    if (grid[r][c].mine) continue;
                    let count = 0;
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            if (grid[r+dr] && grid[r+dr][c+dc] && grid[r+dr][c+dc].mine) count++;
                        }
                    }
                    grid[r][c].count = count;
                }
            }
        }

        function handleAction(r, c, forceFlag = false) {
            if (gameOver || grid[r][c].revealed) return;

            if (mode === 'flag' || forceFlag) {
                grid[r][c].flagged = !grid[r][c].flagged;
                grid[r][c].el.innerText = grid[r][c].flagged ? '🚩' : '';
                grid[r][c].el.classList.toggle('flag');
                flags += grid[r][c].flagged ? 1 : -1;
                document.getElementById('flag-count').innerText = flags;
            } else {
                if (grid[r][c].flagged) return;
                if (grid[r][c].mine) {
                    gameOver = true;
                    grid[r][c].el.innerText = '💣';
                    grid[r][c].el.classList.add('mine');
                    showAlert("Ojej!", "Bomba wybuchła! Spróbuj jeszcze raz ❤️");
                } else {
                    reveal(r, c);
                    checkWin();
                }
            }
        }

        function reveal(r, c) {
            if (!grid[r] || !grid[r][c] || grid[r][c].revealed || grid[r][c].flagged) return;
            grid[r][c].revealed = true;
            grid[r][c].el.classList.add('revealed');
            if (grid[r][c].count > 0) {
                grid[r][c].el.innerText = grid[r][c].count;
            } else {
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) reveal(r + dr, c + dc);
                }
            }
        }

        function checkWin() {
            const settings = config[currentLevel];
            let correctlyRevealed = 0;
            for (let r = 0; r < settings.rows; r++) {
                for (let c = 0; c < settings.cols; c++) {
                    if (grid[r][c].revealed) correctlyRevealed++;
                }
            }

            if (correctlyRevealed === (settings.rows * settings.cols) - settings.mines) {
                if (currentLevel === 1) {
                    currentLevel = 2;
                    showAlert("Brawo!", "Udało się! Ale to nie koniec... czas na wyzwanie finałowe!");
                } else {
                    document.getElementById('main-ui').style.display = 'none';
                    document.getElementById('surprise').style.display = 'block';
                }
            }
        }

        initGame();
    </script>
</body>
</html>
