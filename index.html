<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urodzinowe Wyzwanie dla Mamy!</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #fce4ec; color: #880e4f; }
        #game-container { margin: 20px auto; display: inline-block; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .grid { display: grid; gap: 2px; background-color: #bbb; border: 2px solid #999; margin: 10px auto; }
        .cell { width: 30px; height: 30px; background-color: #eee; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border: 1px solid #ccc; font-size: 14px; }
        .cell.revealed { background-color: #fff; cursor: default; }
        .cell.mine { background-color: #ffcdd2; }
        .cell.flag { background-color: #fff9c4; }
        button { padding: 10px 20px; font-size: 16px; background-color: #ad1457; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #d81b60; }
        #surprise { display: none; max-width: 500px; margin: 20px auto; animation: fadeIn 2s; }
        #surprise img { width: 100%; border-radius: 15px; border: 5px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <h1>🌸 Saper Urodzinowy 🌸</h1>
    <h2 id="level-title">Poziom 1: Rozgrzewka</h2>
    <p id="instructions">Znajdź bezpieczne pola. Uważaj na miny!</p>

    <div id="game-container">
        <div id="grid" class="grid"></div>
        <p>Miny: <span id="mine-count">0</span> | Flagi: <span id="flag-count">0</span></p>
    </div>

    <div id="surprise">
        <h2>🎉 WSZYSTKIEGO NAJLEPSZEGO MAMO! 🎉</h2>
        <p>Jesteś mistrzynią logiki! Skoro poradziłaś sobie z tymi minami, to nic Cię w tym roku nie zatrzyma!</p>
        <img src="mama_i_ja.jpg" alt="Wasze wspólne zdjęcie">
        <p style="font-style: italic; margin-top: 10px;">Kocham Cię!</p>
    </div>

    <script>
        let config = {
            lvl1: { rows: 5, cols: 5, mines: 3 },
            lvl2: { rows: 12, cols: 12, mines: 25 }
        };

        let currentLevel = 1;
        let grid = [];
        let revealedCount = 0;
        let gameOver = false;
        let flags = 0;

        const gridElement = document.getElementById('grid');

        function initGame() {
            const settings = currentLevel === 1 ? config.lvl1 : config.lvl2;
            gridElement.innerHTML = '';
            gridElement.style.gridTemplateColumns = `repeat(${settings.cols}, 30px)`;
            grid = [];
            revealedCount = 0;
            gameOver = false;
            flags = 0;
            document.getElementById('flag-count').innerText = flags;
            document.getElementById('mine-count').innerText = settings.mines;

            // Tworzenie pustej siatki
            for (let r = 0; r < settings.rows; r++) {
                grid[r] = [];
                for (let c = 0; c < settings.cols; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.addEventListener('click', () => handleClick(r, c));
                    cell.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        handleRightClick(r, c);
                    });
                    gridElement.appendChild(cell);
                    grid[r][c] = { mine: false, revealed: false, flagged: false, count: 0, element: cell };
                }
            }

            // Losowanie min
            let minesPlaced = 0;
            while (minesPlaced < settings.mines) {
                let r = Math.floor(Math.random() * settings.rows);
                let c = Math.floor(Math.random() * settings.cols);
                if (!grid[r][c].mine) {
                    grid[r][c].mine = true;
                    minesPlaced++;
                }
            }

            // Liczenie sąsiadów
            for (let r = 0; r < settings.rows; r++) {
                for (let c = 0; c < settings.cols; c++) {
                    if (grid[r][c].mine) continue;
                    let count = 0;
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            if (grid[r + dr] && grid[r + dr][c + dc] && grid[r + dr][c + dc].mine) count++;
                        }
                    }
                    grid[r][c].count = count;
                }
            }
        }

        function handleClick(r, c) {
            if (gameOver || grid[r][c].revealed || grid[r][c].flagged) return;

            if (grid[r][c].mine) {
                revealMines();
                alert("Ojej! Wybuchło! Ale spokojnie Mamo, spróbuj jeszcze raz! ❤️");
                initGame();
                return;
            }

            revealCell(r, c);
            checkWin();
        }

        function handleRightClick(r, c) {
            if (gameOver || grid[r][c].revealed) return;
            grid[r][c].flagged = !grid[r][c].flagged;
            grid[r][c].element.classList.toggle('flag');
            grid[r][c].element.innerText = grid[r][c].flagged ? '🚩' : '';
            flags += grid[r][c].flagged ? 1 : -1;
            document.getElementById('flag-count').innerText = flags;
        }

        function revealCell(r, c) {
            if (!grid[r] || !grid[r][c] || grid[r][c].revealed) return;

            grid[r][c].revealed = true;
            grid[r][c].element.classList.add('revealed');
            revealedCount++;

            if (grid[r][c].count > 0) {
                grid[r][c].element.innerText = grid[r][c].count;
            } else {
                // Flood fill dla pustych pól
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        revealCell(r + dr, c + dc);
                    }
                }
            }
        }

        function revealMines() {
            grid.flat().forEach(cell => {
                if (cell.mine) {
                    cell.element.classList.add('mine');
                    cell.element.innerText = '💣';
                }
            });
            gameOver = true;
        }

        function checkWin() {
            const settings = currentLevel === 1 ? config.lvl1 : config.lvl2;
            if (revealedCount === (settings.rows * settings.cols) - settings.mines) {
                gameOver = true;
                if (currentLevel === 1) {
                    alert("Brawo! To była tylko rozgrzewka. Teraz zaczynają się schody!");
                    currentLevel = 2;
                    document.getElementById('level-title').innerText = "Poziom 2: Wyzwanie dla Ekspertki";
                    initGame();
                } else {
                    document.getElementById('game-container').style.display = 'none';
                    document.getElementById('level-title').style.display = 'none';
                    document.getElementById('instructions').style.display = 'none';
                    document.getElementById('surprise').style.display = 'block';
                }
            }
        }

        initGame();
    </script>
</body>
</html>
