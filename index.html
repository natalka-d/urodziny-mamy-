<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wyzwanie dla Mamy!</title>
    <style>
        :root {
            --primary-color: #ad1457;
            --bg-glass: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 10px;
            background-image: url('rm321-baifernn-01-e.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            width: 100%;
            box-sizing: border-box;
        }

        #game-wrapper {
            background: var(--bg-glass);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 2px solid white;
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { color: var(--primary-color); font-size: 1.4em; margin: 10px 0; }

        .grid {
            display: grid;
            gap: 2px;
            background-color: #bbb;
            border: 4px solid #bbb;
            margin: 15px auto;
            padding: 2px;
            border-radius: 8px;
            width: fit-content;
            max-width: calc(100vw - 50px); 
            box-sizing: border-box;
        }

        .cell {
            width: 7.8vw;
            height: 7.8vw;
            max-width: 40px;
            max-height: 40px;
            background-color: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            border-radius: 2px;
            font-size: clamp(12px, 3.5vw, 18px);
            user-select: none;
            box-sizing: border-box;
        }

        .cell.revealed { background-color: #fff; cursor: default; border: 1px solid #ddd; }
        .cell.mine { background-color: #ffcdd2; }
        .cell.flag { background-color: #fff9c4; color: #d32f2f; }

        .controls { display: flex; justify-content: center; gap: 8px; margin-top: 15px; }
        .mode-btn {
            padding: 10px 18px;
            border: 2px solid var(--primary-color);
            border-radius: 50px;
            background: white;
            color: var(--primary-color);
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }
        .mode-btn.active { background: var(--primary-color); color: white; }

        .count-1 { color: #1976D2; }
        .count-2 { color: #388E3C; }
        .count-3 { color: #D32F2F; }

        /* MODAL I OVERLAY */
        #custom-alert {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 20px; z-index: 1000;
            box-shadow: 0 0 50px rgba(0,0,0,0.3); width: 85%; max-width: 280px;
            text-align: center;
        }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }

        /* FINALNA NIESPODZIANKA */
        #final-surprise {
            display: none; 
            background: var(--bg-glass); 
            padding: 20px; 
            border-radius: 20px;
            width: 95%; 
            max-width: 500px; 
            margin: 10px auto; 
            border: 3px solid var(--primary-color);
            box-sizing: border-box;
            text-align: center;
        }
        
        #final-surprise img { 
            width: 100%; 
            height: auto;
            border-radius: 10px; 
            margin-bottom: 15px; 
            display: block;
        }

        /* PUDEŁKO PREZENTOWE */
        #gift-box {
            font-size: 80px;
            cursor: pointer;
            margin: 20px 0;
            transition: transform 0.3s;
            display: inline-block;
            animation: bounce 2s infinite;
        }
        #gift-box:hover { transform: scale(1.1); }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }

        #voucher-container {
            display: none;
            margin-top: 20px;
            border-top: 2px dashed var(--primary-color);
            padding-top: 20px;
        }

        .main-btn { background: var(--primary-color); color: white; border: none; padding: 12px 24px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="game-ui">
        <div id="game-wrapper">
            <h1>Wyzwanie dla Mamy 🌸</h1>
            <p style="font-size: 0.9em; color: #555; margin: 0;">Rozwiąż zagadkę dla niespodzianki!</p>
            <div id="grid" class="grid"></div>
            <p style="font-weight: bold; margin: 10px 0;">Miny: <span id="mine-count">0</span> | Flagi: <span id="flag-count">0</span></p>
            <div class="controls">
                <button id="btn-dig" class="mode-btn active" onclick="setMode('dig')">⛏️ Odkrywaj</button>
                <button id="btn-flag" class="mode-btn" onclick="setMode('flag')">🚩 Flaga</button>
            </div>
        </div>
    </div>

    <div id="final-surprise">
        <h2>🎉 WSZYSTKIEGO NAJLEPSZEGO MAMO! 🎉</h2>
        <img src="1.jpg">
        <img src="2.jpg">
        <img src="6.jpg">
        <img src="7.jpg">
        <img src="9.jpg">
        
        <p style="font-size: 1.1em; font-weight: bold;">To jeszcze nie wszystko! Kliknij w prezent: 🎁</p>
        
        <div id="gift-box" onclick="openGift()">🎁</div>

        <div id="voucher-container">
            <h3 style="color: var(--primary-color);">TADAAA! Mamy coś dla Ciebie! 🎟️</h3>
            <img src="bon.jpg" alt="Bon Prezent Marzeń">
            <p style="font-size: 1.2em; color: var(--primary-color); font-weight: bold;">Kochamy Cię! ❤️</p>
        </div>
    </div>

    <div id="overlay"></div>
    <div id="custom-alert">
        <h3 id="alert-title" style="margin-top: 0; color: var(--primary-color);"></h3>
        <p id="alert-msg" style="margin-bottom: 20px;"></p>
        <button class="main-btn" onclick="closeAlert()">OK!</button>
    </div>

    <script>
        const config = {
            1: { rows: 5, cols: 5, mines: 3 },
            2: { rows: 10, cols: 10, mines: 15 }
        };

        let currentLvl = 1;
        let grid = [];
        let gameOver = false;
        let mode = 'dig';
        let revealedCount = 0;

        function openGift() {
            document.getElementById('gift-box').style.display = 'none';
            document.getElementById('voucher-container').style.display = 'block';
            window.scrollBy({ top: 300, behavior: 'smooth' });
        }

        function setMode(m) {
            mode = m;
            document.getElementById('btn-dig').classList.toggle('active', m === 'dig');
            document.getElementById('btn-flag').classList.toggle('active', m === 'flag');
        }

        function showAlert(title, msg) {
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-msg').innerText = msg;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('custom-alert').style.display = 'block';
        }

        function closeAlert() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('custom-alert').style.display = 'none';
            const s = config[currentLvl];
            const totalSafe = (s.rows * s.cols) - s.mines;

            if (gameOver || revealedCount === totalSafe) {
                if (!gameOver && currentLvl === 1) currentLvl = 2;
                initGame();
            }
        }

        function initGame() {
            const s = config[currentLvl];
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            gridEl.style.gridTemplateColumns = `repeat(${s.cols}, 1fr)`;
            grid = [];
            revealedCount = 0;
            gameOver = false;
            document.getElementById('flag-count').innerText = 0;
            document.getElementById('mine-count').innerText = s.mines;

            for (let r = 0; r < s.rows; r++) {
                grid[r] = [];
                for (let c = 0; c < s.cols; c++) {
                    const el = document.createElement('div');
                    el.className = 'cell';
                    el.onclick = () => handleAction(r, c);
                    el.oncontextmenu = (e) => { e.preventDefault(); handleAction(r, c, true); };
                    gridEl.appendChild(el);
                    grid[r][c] = { mine: false, revealed: false, flagged: false, count: 0, el: el };
                }
            }

            let mPlaced = 0;
            while (mPlaced < s.mines) {
                let r = Math.floor(Math.random()*s.rows), c = Math.floor(Math.random()*s.cols);
                if (!grid[r][c].mine) { grid[r][c].mine = true; mPlaced++; }
            }

            for (let r = 0; r < s.rows; r++) {
                for (let c = 0; c < s.cols; c++) {
                    if (grid[r][c].mine) continue;
                    let count = 0;
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            if (grid[r+dr] && grid[r+dr][c+dc] && grid[r+dr][c+dc].mine) count++;
                        }
                    }
                    grid[r][c].count = count;
                }
            }
        }

        function handleAction(r, c, forceFlag = false) {
            if (gameOver || grid[r][c].revealed) return;
            const cell = grid[r][c];

            if (mode === 'flag' || forceFlag) {
                cell.flagged = !cell.flagged;
                cell.el.innerText = cell.flagged ? '🚩' : '';
                cell.el.classList.toggle('flag');
                let fCount = grid.flat().filter(cc => cc.flagged).length;
                document.getElementById('flag-count').innerText = fCount;
            } else {
                if (cell.flagged) return;
                if (cell.mine) {
                    gameOver = true;
                    cell.el.innerText = '💣';
                    cell.el.classList.add('mine');
                    showAlert("Ups!", "Bomba! Spróbuj jeszcze raz ❤️");
                } else {
                    reveal(r, c);
                    checkWin();
                }
            }
        }

        function reveal(r, c) {
            if (!grid[r] || !grid[r][c] || grid[r][c].revealed || grid[r][c].flagged) return;
            const cell = grid[r][c];
            cell.revealed = true;
            cell.el.classList.add('revealed');
            revealedCount++;
            if (cell.count > 0) {
                cell.el.innerText = cell.count;
                cell.el.classList.add('count-' + cell.count);
            } else {
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) reveal(r+dr, c+dc);
                }
            }
        }

        function checkWin() {
            const s = config[currentLvl];
            if (revealedCount === (s.rows * s.cols) - s.mines) {
                if (currentLvl === 1) {
                    showAlert("Super!", "Pierwszy etap za Tobą! Gotowa na finał?");
                } else {
                    document.getElementById('game-ui').style.display = 'none';
                    document.getElementById('final-surprise').style.display = 'block';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            }
        }

        initGame();
    </script>
</body>
</html>
